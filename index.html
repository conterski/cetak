<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Cetak Draft Pesanan</title>
<style>
  :root{
    --bg:#f4f5f7; --card:#fff; --border:#e2e4e8; --accent:#2563eb;
    --accent-dark:#1e50c8; --text:#1f2328; --muted:#6f7680;
    --ok:#15803d; --err:#b91c1c; --seg:#e8eaee; --on:#dbe7ff;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{margin:0; background:var(--bg); color:var(--text);
       font-family:-apple-system,"Segoe UI",sans-serif; padding-bottom:90px}
  .top{display:flex; align-items:center; gap:8px; padding:12px 14px 6px}
  .top h1{font-size:17px; margin:0; flex:1}
  .btn{border:0; border-radius:10px; cursor:pointer; font-family:inherit}
  #btnBT{background:var(--seg); color:var(--muted); padding:9px 12px; font-size:13px; font-weight:600}
  #btnBT.on{background:var(--on); color:var(--accent)}
  .rowbar{display:flex; gap:6px; padding:6px 14px; flex-wrap:wrap}
  .seg{display:flex; background:var(--seg); border-radius:10px; padding:3px}
  .seg .btn{background:transparent; color:var(--muted); padding:8px 14px; font-size:13px}
  .seg .btn.act{background:var(--card); color:var(--accent); font-weight:700}
  .tog{background:var(--seg); color:var(--muted); padding:8px 12px; font-size:13px}
  .tog.act{background:var(--on); color:var(--accent); font-weight:700}
  .card{background:var(--card); border:1px solid var(--border); border-radius:14px;
        margin:6px 14px; overflow:hidden}
  .card .cap{font-size:10px; font-weight:700; color:var(--muted); padding:10px 14px 2px;
             letter-spacing:.4px}
  textarea{width:100%; border:0; outline:none; font:inherit; font-size:16px;
           padding:8px 14px 12px; min-height:170px; resize:vertical; background:transparent}
  /* kalkulator */
  #calcNav{display:flex; align-items:center; gap:6px; padding:8px 14px 0; font-size:12px; color:var(--muted)}
  #calcNav .btn{background:transparent; color:var(--muted); font-size:15px; padding:4px 8px}
  #btnHist{margin-left:auto; font-size:11px; color:var(--muted); background:transparent}
  #calcNav #btnZeroC, #calcNav #btnNew{font-size:11px; padding:5px 10px; border-radius:8px; margin-left:8px; font-weight:700}
  #calcNav #btnZeroC{background:var(--seg); color:var(--muted)}
  #calcNav #btnZeroC.act{background:var(--on); color:var(--accent)}
  #calcNav #btnNew{background:var(--on); color:var(--accent)}
  #calcTotal{padding:2px 14px; text-align:right; color:var(--accent); font-weight:700; font-size:15px}
  .inrow{display:flex; gap:8px; padding:6px 14px}
  .inrow input{border:1px solid var(--border); border-radius:10px; background:#f7f8fa;
               font-family:ui-monospace,Menlo,monospace; outline:none; padding:10px}
  #inDate{width:88px; font-size:15px; text-align:center}
  #inAmt{flex:1; font-size:22px; text-align:right; min-width:0}
  #editBar{display:none; margin:0 14px; padding:8px 12px; background:var(--on); color:var(--accent);
           border-radius:10px; font-size:13px; font-weight:600; align-items:center; gap:8px}
  #editBar .btn{padding:6px 10px; font-size:12px}
  #btnDelRow{background:#fde8e8; color:var(--err)}
  #btnCancelEdit{background:var(--card); color:var(--muted)}
  #pad{display:grid; grid-template-columns:repeat(4,1fr); gap:6px; padding:8px 14px 14px}
  #pad .btn{padding:14px 0; font-size:18px; font-weight:600; background:#f1f2f5; color:var(--text)}
  #pad .btn.acc{background:var(--on); color:var(--accent)}
  #pad .btn.dan{background:#fde8e8; color:var(--err)}
  #pad .btn:active{filter:brightness(.92)}
  /* pratinjau */
  #preview{font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12px; line-height:1.5;
           padding:8px 14px 12px; margin:0; overflow-x:auto; min-height:60px}
  #preview .row{display:inline}
  #preview .row.sel{background:var(--on); color:var(--accent); border-radius:4px}
  /* mode kalkulator: pita jadi jendela tinggi tetap di atas numpad */
  #previewCard.calc{border:0; margin:0; background:transparent}
  #previewCard.calc .cap{display:none}
  /* tinggi diatur JS (layoutCalc); min-height:0 supaya tak menabrak numpad */
  #previewCard.calc #preview{overflow-y:auto; margin:6px 14px 2px;
    padding:8px 12px; background:var(--input); border:1px solid var(--border);
    border-radius:10px; min-height:0}
  /* numpad menempel di bawah (di atas bilah CETAK); posisi diatur JS */
  #calcKeys{background:var(--bg)}
  body.calc #calcKeys{border-top:1px solid var(--border);
    padding:0 0 2px; box-shadow:0 -6px 14px rgba(0,0,0,.06);
    display:flex; flex-direction:column}
  /* numpad menyusut mengikuti tinggi yang diseret pengguna */
  body.calc #pad{flex:1 1 auto; min-height:0; grid-auto-rows:1fr; padding:6px 14px 8px}
  body.calc #pad .btn{padding:0; min-height:0}
  /* pegangan seret (hanya mode kalkulator di layar sempit) */
  #keysGrip{display:none}
  body.calc #keysGrip{display:block; position:relative; height:20px; flex:0 0 20px;
    touch-action:none; cursor:ns-resize}
  body.calc #keysGrip::before{content:""; position:absolute; left:50%; top:7px;
    transform:translateX(-50%); width:44px; height:5px; border-radius:3px; background:#c3c8d0}
  body.calc #keysGrip:active::before{background:var(--accent)}
  .foot{position:fixed; left:0; right:0; bottom:0; background:var(--bg);
        border-top:1px solid var(--border); display:flex; gap:8px; align-items:center;
        padding:10px 14px calc(10px + env(safe-area-inset-bottom))}
  #btnPrint{background:var(--accent); color:#fff; font-size:16px; font-weight:700; padding:14px 26px}
  #btnPrint:disabled{opacity:.5}
  #btnClear{background:var(--seg); color:var(--text); font-size:14px; padding:14px 16px}
  #stat{flex:1; font-size:12px; color:var(--muted); text-align:right}
  #stat.ok{color:var(--ok)} #stat.err{color:var(--err)}
  /* ====== layar sempit (HP): kartu menumpuk (default) ====== */
  /* caption kalkulator: judul + tombol toggle Tanggal (tampil di semua ukuran) */
  .calcCap{display:flex; align-items:center; gap:10px}
  #togDate{padding:5px 10px; font-size:11px}
  /* ====== layar lebar (desktop): kalkulator kiri, pratinjau kanan ====== */
  @media (min-width:768px){
    body{padding-bottom:0}
    #stage{display:flex; gap:14px; align-items:stretch; margin:6px 14px}
    #stage>.card{margin:0}
    #panelText{flex:1.3 1 0; display:flex; flex-direction:column}
    #panelText textarea{flex:1 1 auto; min-height:0}
    #panelCalc{flex:0 0 360px; display:flex; flex-direction:column}
    #panelCalc #calcKeys{flex:1 1 auto; display:flex; flex-direction:column}
    #panelCalc #pad{flex:1 1 auto; grid-auto-rows:1fr}
    #previewCard{flex:1 1 0; display:flex; flex-direction:column; min-height:0}
    #previewCard .cap{flex:0 0 auto}
    #previewCard #preview{flex:1 1 0; min-height:0; overflow:auto}
    #btlog{display:none}
    /* di desktop numpad TIDAK menempel ke bawah layar */
    body.calc #calcKeys{border:0; box-shadow:none}
  }
</style>
</head>
<body>

<div class="top">
  <h1>Cetak Draft Pesanan</h1>
  <button class="btn" id="btnBT">&#9679; Hubungkan</button>
</div>

<div class="rowbar">
  <div class="seg" id="segMode">
    <button class="btn" data-m="table">Tabel</button>
    <button class="btn" data-m="plain">Teks polos</button>
    <button class="btn" data-m="calc">Kalkulator</button>
  </div>
</div>
<div class="rowbar">
  <button class="btn tog" id="togNum">Nomor urut</button>
  <button class="btn tog" id="togHead">Tanggal &amp; garis</button>
  <button class="btn tog" id="togAuto" style="display:none">Auto-cetak</button>
</div>

<div id="stage">

<div class="card" id="panelText">
  <div class="cap" id="capText">KETIK PESANAN — SATU BARANG PER BARIS</div>
  <textarea id="txt" placeholder="Besi beton 8 mm 10 btg&#10;Semen 5 sak&#10;Gypsum 6 lbr"></textarea>
</div>

<div class="card" id="panelCalc" style="display:none">
  <div class="cap calcCap">
    <span>KALKULATOR PITA</span>
    <button class="btn tog" id="togDate">Tanggal</button>
  </div>
  <div id="calcNav">
    <button class="btn" id="btnPrev">&#9664;</button>
    <span id="tapeLbl">Pita 1/1</span>
    <button class="btn" id="btnNext">&#9654;</button>
    <button class="btn" id="btnHist">Hapus riwayat</button>
    <button class="btn tog" id="btnZeroC" title="Tampilkan baris 0 C di awal tiap pita">0 C</button>
    <button class="btn" id="btnNew" title="Buat pita baru">Baru</button>
  </div>
  <div id="calcTotal">Total: 0 (0 item)</div>
  <div id="calcKeys">
  <div id="keysGrip" title="Geser untuk mengatur tinggi numpad (ketuk dua kali: otomatis)"></div>
  <div class="inrow" id="calcInRow">
    <input id="inDate" placeholder="h/b" maxlength="5" inputmode="numeric">
    <input id="inAmt" placeholder="0" inputmode="decimal">
  </div>
  <div id="editBar"><span id="editLbl"></span>
    <button class="btn" id="btnDelRow">Hapus</button>
    <button class="btn" id="btnCancelEdit">Batal</button>
  </div>
  <div id="pad">
    <button class="btn dan" data-k="C">C</button>
    <button class="btn" data-k="BS">&#9003;</button>
    <button class="btn" data-k="SUB">SUB</button>
    <button class="btn acc" data-k="TOT">TOTAL</button>
    <button class="btn" data-k="7">7</button><button class="btn" data-k="8">8</button>
    <button class="btn" data-k="9">9</button><button class="btn acc" data-k="+">+</button>
    <button class="btn" data-k="4">4</button><button class="btn" data-k="5">5</button>
    <button class="btn" data-k="6">6</button><button class="btn" data-k="-">&#8722;</button>
    <button class="btn" data-k="1">1</button><button class="btn" data-k="2">2</button>
    <button class="btn" data-k="3">3</button><button class="btn" data-k="00">00</button>
    <button class="btn" data-k="0">0</button><button class="btn" data-k="000">000</button>
    <button class="btn" data-k=".">.</button><button class="btn dan" data-k="CA">CA</button>
  </div>
  </div>
</div>

<div class="card" id="previewCard">
  <div class="cap">PRATINJAU</div>
  <pre id="preview"></pre>
</div>

</div><!-- /stage -->

<details class="card" id="btlog" style="padding:0 0 8px">
  <summary style="font-size:11px; font-weight:700; color:#6f7680; padding:10px 14px; cursor:pointer">LOG BLUETOOTH (untuk diagnosa)</summary>
  <pre id="btlogtxt" style="font-family:ui-monospace,Menlo,monospace; font-size:10px; margin:0; padding:0 14px; white-space:pre-wrap; word-break:break-all; color:#6f7680"></pre>
</details>

<div class="foot">
  <button class="btn" id="btnPrint">CETAK</button>
  <button class="btn" id="btnClear">Bersihkan</button>
  <div id="stat">Siap.</div>
</div>

<script>
"use strict";
/* ================= format (port dari printapp.py) ================= */
const COLS = 31, FEED_LINES = 4, LEFT_MARGIN_DOTS = 12;

const UNITS = new Set(["btg","btng","batang","bh","buah","bj","biji","lbr","lembar",
 "lmbr","sak","zak","kg","ons","gr","gram","ltr","lt","liter","gln","galon","m","mtr",
 "meter","m2","m3","kubik","kbk","roll","rol","dus","box","pcs","pc","pak","pack",
 "ikat","keping","kaleng","klg","set","unit","pasang","psg","btl","botol","ember",
 "drum","karung","krg","lusin","kodi","rim","papan"]);

const QTY_RE=/^\d+(?:[.,\/]\d+)?$/, UNIT_RE=/^[A-Za-z]{1,8}$/,
 GLUED_RE=/^(\d+(?:[.,\/]\d+)?)([A-Za-z][A-Za-z0-9]{0,7})$/,
 NOTE_RE=/\(\s*([^()]*?)\s*\)\s*$/,
 LIST_PREFIX_RE=/^\d{1,2}\s*[.)]+\s*(?=[^\d\s])/,
 COMMA_PREFIX_RE=/^\d{1,2},(?=[A-Za-z])/,
 EQ_QTY_RE=/^(.+?)\s*=\s*(\d+(?:[.,\/]\d+)?)$/,
 QTY_FIRST_RE=/^(\d+(?:[.,\/]\d+)?)\s*([A-Za-z][A-Za-z0-9]{0,7})\s+(.+)$/;

const norm = s => s.trim().split(/\s+/).join(" ");

function cleanItem(item){
  item = item.replace(/\s*\.{2,}\s*/g," ").replace(/(^|\s)\.+(?=[A-Za-z0-9])/g,"$1");
  item = item.replace(/^[\s.,\-_]+|[\s.,\-_]+$/g,"");
  return norm(item);
}
function tryQtyFirst(s){
  const m = s.match(QTY_FIRST_RE);
  if (m && UNITS.has(m[2].toLowerCase())) return [m[3], m[1], m[2]];
  return null;
}
function tryQtyLast(s){
  const t = s.split(/\s+/).filter(Boolean);
  if (t.length>=3 && QTY_RE.test(t[t.length-2]) && UNIT_RE.test(t[t.length-1]))
    return [t.slice(0,-2).join(" "), t[t.length-2], t[t.length-1]];
  if (t.length>=2){
    const m = t[t.length-1].match(GLUED_RE);
    if (m && (/^[A-Za-z]+$/.test(m[2]) || UNITS.has(m[2].toLowerCase())))
      return [t.slice(0,-1).join(" "), m[1], m[2]];
  }
  return null;
}
function parseLine(line, expectedNo){
  let s = norm(line), note = null;
  const nm = s.match(NOTE_RE);
  if (nm){ note = nm[1]; s = s.slice(0, nm.index).trim(); }
  s = s.replace(LIST_PREFIX_RE,"").replace(COMMA_PREFIX_RE,"");
  if (expectedNo != null){
    const g = s.match(/^(\d{1,2})(?=[A-Za-z])/);
    if (g && parseInt(g[1]) === expectedNo) s = s.slice(g[1].length);
  }
  let parsed = tryQtyFirst(s);
  if (!parsed && expectedNo != null){
    const t = s.split(/\s+/).filter(Boolean);
    if (t.length>=2 && /^\d+$/.test(t[0]) && parseInt(t[0])===expectedNo && !tryQtyFirst(s)){
      const rest = t.slice(1).join(" ");
      if (EQ_QTY_RE.test(rest) || tryQtyLast(rest) || tryQtyFirst(rest)){
        s = rest; parsed = tryQtyFirst(s);
      }
    }
  }
  if (!parsed){ const m = s.match(EQ_QTY_RE); if (m) parsed = [m[1], m[2], ""]; }
  if (!parsed) parsed = tryQtyLast(s);
  let [item, qty, unit] = parsed || [s, null, null];
  item = cleanItem(item);
  if (note) item = (item + " (" + note + ")").trim();
  return [item, qty, unit];
}
function wrapWords(text, width){
  const words = text.split(/\s+/).filter(Boolean), lines = [];
  let cur = "";
  for (let w of words){
    if (!cur) cur = w;
    else if (cur.length + 1 + w.length <= width) cur += " " + w;
    else { lines.push(cur); cur = w; }
    while (cur.length > width){ lines.push(cur.slice(0,width)); cur = cur.slice(width); }
  }
  if (cur) lines.push(cur);
  return lines.length ? lines : [""];
}
function pad2(n){ return String(n).padStart(2,"0"); }
function headerLines(now, cols){
  const stamp = `${pad2(now.getDate())}/${pad2(now.getMonth()+1)}/${now.getFullYear()} ` +
                `${pad2(now.getHours())}:${pad2(now.getMinutes())}`;
  const pad = Math.max(0, Math.floor((cols - stamp.length)/2));
  return [" ".repeat(pad) + stamp, "-".repeat(cols)];
}
function renderTable(rows, numbered, cols, now, headers){
  const out = [];
  if (headers) out.push(...headerLines(now, cols));
  if (rows.length){
    const qtyW = rows.reduce((w,r)=> r[1] ? Math.max(w, r[1].length) : w, 3);
    const unitW = rows.reduce((w,r)=> r[2] ? Math.max(w, r[2].length) : w, 4);
    const noW = numbered ? String(rows.length).length + 1 : 0;
    if (headers){
      let h = numbered ? "No".padEnd(noW) + " " : "";
      h += "Qty".padStart(qtyW) + " " + "Unit".padEnd(unitW) + " Item";
      out.push(h.slice(0, cols), "-".repeat(cols));
    }
    const prefixW = (numbered ? noW + 1 : 0) + qtyW + 1 + unitW + 1;
    const itemW = Math.max(cols - prefixW, 8);
    rows.forEach((r, idx) => {
      const [item, qty, unit] = r;
      const no = numbered ? (String(idx+1)+".").padEnd(noW) + " " : "";
      if (qty != null){
        const first = no + qty.padStart(qtyW) + " " + (unit||"").padEnd(unitW) + " ";
        const ch = wrapWords(item, itemW);
        out.push((first + ch[0]).replace(/\s+$/,""));
        for (let c of ch.slice(1)) out.push(" ".repeat(prefixW) + c);
      } else {
        const ch = wrapWords(item, cols - no.length);
        out.push((no + ch[0]).replace(/\s+$/,""));
        for (let c of ch.slice(1)) out.push(" ".repeat(no.length) + c);
      }
    });
  }
  if (headers) out.push("-".repeat(cols));
  return out.join("\n");
}
function formatPlain(text, numbered, cols, now, headers){
  const out = [];
  if (headers) out.push(...headerLines(now, cols));
  let lines = text.split("\n").map(l => l.replace(/\s+$/,""));
  while (lines.length && !lines[0].trim()) lines.shift();
  while (lines.length && !lines[lines.length-1].trim()) lines.pop();
  let n = 0, prevBlank = false;
  for (let line of lines){
    if (!line.trim()){ if (!prevBlank) out.push(""); prevBlank = true; continue; }
    prevBlank = false; line = norm(line);
    let prefix = "";
    if (numbered){ n += 1; prefix = n + ". "; }
    const indent = numbered ? prefix.length : 2;
    const ch = wrapWords(line, cols - indent);
    out.push(prefix + ch[0]);
    for (let c of ch.slice(1)) out.push(" ".repeat(indent) + c);
  }
  if (headers) out.push("-".repeat(cols));
  return out.join("\n");
}
function formatDraft(text, numbered, cols, now, plain, headers){
  if (plain) return formatPlain(text, numbered, cols, now, headers);
  const rows = []; let pos = 0;
  for (let l of text.split("\n")){
    if (!l.trim()){ pos = 0; continue; }
    pos += 1; rows.push(parseLine(l, pos));
  }
  return renderTable(rows, numbered, cols, now, headers);
}
/* ---- kalkulator ---- */
function parseAmount(s){
  s = s.trim().replace(/,/g,"");
  if (!/^\d*\.?\d*$/.test(s) || s === "" || s === ".") return null;
  const v = parseFloat(s);
  return isNaN(v) ? null : v;
}
function fmtAmount(v){
  const neg = v < 0;
  let s = Math.abs(v).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
  if (s.endsWith(".00")) s = s.slice(0,-3);
  return (neg ? "-" : "") + s;
}
function resolveTape(events){
  let total = 0, count = 0;
  const res = [];
  for (const ev of events){
    if (ev[0]==="e"){ total += ev[2]==="+" ? ev[1] : -ev[1]; count++; res.push(ev); }
    else if (ev[0]==="s") res.push(["s", total]);
    else if (ev[0]==="c"){ res.push(["c"]); total = 0; count = 0; }
    else if (ev[0]==="t"){ res.push(["t", total, count]); total = 0; count = 0; }
  }
  return [res, total, count];
}
function renderCalcTape(events, numbered, cols, now, headers, zeroc){
  if (zeroc === undefined) zeroc = true;
  const [res] = resolveTape(events);
  const out = [], lineMap = {};
  if (headers) out.push(...headerLines(now, cols));
  const entries = res.filter(op => op[0]==="e");
  const dateW = entries.reduce((w,op)=> op[3] ? Math.max(w, op[3].length) : w, 0);
  let n = 0, maxN = 0;
  for (const op of res){
    if (op[0]==="e"){ n++; maxN = Math.max(maxN, n); }
    else if (op[0]==="t" || op[0]==="c") n = 0;
  }
  const noW = (numbered && maxN) ? String(maxN).length + 1 : 0;
  n = 0;
  res.forEach((op, i) => {
    if (op[0]==="e"){
      n++;
      let prefix = numbered ? (n+".").padEnd(noW) : "";
      if (dateW) prefix += (prefix ? " " : "") + (op[3]||"").padEnd(dateW);
      const amt = fmtAmount(op[1]);
      lineMap[out.length] = i;
      out.push(prefix + amt.padStart(Math.max(cols - prefix.length - 2, amt.length)) + " " + op[2]);
    } else if (op[0]==="s"){
      out.push(fmtAmount(op[1]).padStart(cols-2) + " S");
    } else if (op[0]==="c"){
      if (zeroc) out.push("0".padStart(cols-2) + " C");
      n = 0;
    } else {
      out.push(`(${op[2]} item)`.padStart(cols));
      out.push("-".repeat(14).padStart(cols));
      out.push(fmtAmount(op[1]).padStart(cols-2) + " *");
      out.push(""); n = 0;
    }
  });
  if (headers) out.push("-".repeat(cols));
  return [out.join("\n"), lineMap];
}
/* ================= status & state ================= */
const $ = id => document.getElementById(id);
const statEl = $("stat");
function setStat(msg, cls){ statEl.textContent = msg; statEl.className = cls || ""; }

let mode = localStorage.cdp_mode || "table";
let numbered = localStorage.cdp_num !== "0";
let headers = localStorage.cdp_head !== "0";
let autoprint = localStorage.cdp_auto === "1";
let usedate = localStorage.cdp_usedate === "1";   // kolom tanggal per-baris (default mati)
let zeroc = localStorage.cdp_zeroc !== "0";       // baris "0 C" di awal tiap pita (default nyala)
let tapes = [[["c"]]], active = 0, sel = null;
try {
  const t = JSON.parse(localStorage.cdp_tapes || "null");
  if (Array.isArray(t) && t.length) tapes = t.slice(-6);
} catch(e){}
active = tapes.length - 1;
$("txt").value = localStorage.cdp_text || "";

/* ====== layout responsif ====== */
const mqDesktop = window.matchMedia("(min-width:768px)");
const isDesktop = () => mqDesktop.matches;

/* desktop: tinggi panggung mengisi ruang sampai bilah CETAK, agar
   kalkulator (kiri) & pratinjau (kanan) sama tinggi & sejajar */
function layoutDesktop(){
  const stage = $("stage");
  if (!isDesktop()){ stage.style.height = ""; return; }
  const footH = document.querySelector(".foot").getBoundingClientRect().height;
  const top = stage.getBoundingClientRect().top;
  stage.style.height = Math.max(340, Math.floor(window.innerHeight - top - footH - 12)) + "px";
}
/* HP: numpad menempel di bawah, tingginya bisa diseret; sisanya untuk pita.
   keysH = 0 berarti otomatis (proporsional terhadap tinggi layar). */
const MIN_KEYS = 170, MIN_PREVIEW = 120, FLOOR_PREVIEW = 60, GAP = 8, KEYS_RATIO = 0.55;
let keysH = parseInt(localStorage.cdp_keysh || "0", 10) || 0;

function layoutCalc(){
  const keys = $("calcKeys"), pv = $("preview");
  if (!(mode === "calc" && !isDesktop())){
    keys.style.position = keys.style.left = keys.style.right =
      keys.style.bottom = keys.style.zIndex = keys.style.height = "";
    pv.style.height = "";
    return;
  }
  const footH = document.querySelector(".foot").getBoundingClientRect().height;
  keys.style.position = "fixed";
  keys.style.left = "0"; keys.style.right = "0";
  keys.style.bottom = footH + "px";
  keys.style.zIndex = "10";

  // ruang yang tersedia dari atas pita sampai bilah CETAK
  keys.style.height = "";                       // ukur tinggi alami numpad dulu
  const natural = keys.offsetHeight;
  const top = pv.getBoundingClientRect().top;
  const avail = window.innerHeight - footH - top - GAP;

  // batas: numpad cukup besar untuk dipakai, pita selalu kebagian sisa ruang
  const minKeys = Math.min(MIN_KEYS, Math.max(110, avail - FLOOR_PREVIEW));
  const maxKeys = Math.max(minKeys, avail - FLOOR_PREVIEW);
  // otomatis: tak lebih dari KEYS_RATIO ruang, tak lebih tinggi dari alaminya,
  // dan sebisanya sisakan MIN_PREVIEW untuk pita
  const auto = Math.min(natural, Math.round(avail * KEYS_RATIO), Math.max(minKeys, avail - MIN_PREVIEW));
  let h = Math.max(minKeys, Math.min(keysH || auto, maxKeys));

  keys.style.height = h + "px";
  pv.style.height = Math.max(FLOOR_PREVIEW, Math.floor(avail - h)) + "px";
  return h;
}
/* pegangan seret: tarik ke atas = numpad lebih tinggi, ke bawah = pita lebih lega */
function initGrip(){
  const grip = $("keysGrip");
  let startY = 0, startH = 0, dragging = false;
  grip.addEventListener("pointerdown", e => {
    if (!(mode === "calc" && !isDesktop())) return;
    dragging = true; startY = e.clientY; startH = $("calcKeys").offsetHeight;
    try { grip.setPointerCapture(e.pointerId); } catch(_e){}
    e.preventDefault();
  });
  grip.addEventListener("pointermove", e => {
    if (!dragging) return;
    keysH = startH + (startY - e.clientY);   // seret ke atas -> makin tinggi
    layoutCalc();
    e.preventDefault();
  });
  const end = e => {
    if (!dragging) return;
    dragging = false;
    try { grip.releasePointerCapture(e.pointerId); } catch(_e){}
    keysH = $("calcKeys").offsetHeight;      // simpan nilai yang sudah dibatasi
    localStorage.cdp_keysh = String(keysH);
  };
  grip.addEventListener("pointerup", end);
  grip.addEventListener("pointercancel", end);
  // ketuk dua kali -> kembali ke tinggi otomatis
  grip.addEventListener("dblclick", () => {
    keysH = 0; delete localStorage.cdp_keysh; layoutCalc();
    setStat("Tinggi numpad otomatis.");
  });
}

/* ================= kolom tanggal (d/m) ================= */
/* input 4 angka DDMM -> tampil "d/m" (buang nol depan). mis. 0907 -> 9/7 */
function fmtDate(raw){
  raw = String(raw || "").replace(/\D/g,"").slice(0,4);
  if (raw.length <= 2) return raw;                 // masih mengetik hari
  const d = String(parseInt(raw.slice(0,2), 10));
  const mRaw = raw.slice(2);
  const m = mRaw.length === 2 ? String(parseInt(mRaw, 10)) : mRaw;
  return d + "/" + m;
}
/* "9/7" -> "0907" (untuk memuat ulang saat mengedit baris) */
function dateToRaw(disp){
  disp = String(disp || "").trim();
  if (!disp) return "";
  const p = disp.split("/");
  const d = (p[0] || "").replace(/\D/g,"");
  const m = (p[1] || "").replace(/\D/g,"");
  if (p.length < 2) return d.slice(0,4);
  return (d.padStart(2,"0").slice(0,2)) + (m.padStart(2,"0").slice(0,2));
}
function setDate(raw){
  const el = $("inDate");
  raw = String(raw || "").replace(/\D/g,"").slice(0,4);
  el.dataset.raw = raw;
  el.value = fmtDate(raw);
}

}
function moveCaretEnd(el){ const n = el.value.length; try{ el.setSelectionRange(n,n); }catch(e){} }

/* numpad -> kolom Tanggal: angka mentah, penuh 4 digit langsung lompat ke Nominal */
function padDateDigit(d){
  const el = $("inDate");

function liveComma(){
  const el = $("inAmt");
  let raw = el.value.replace(/,/g,"");
  if (!raw || raw === "." || !/^\d*\.?\d*$/.test(raw)) return;
  const [ip, dec] = raw.split(".");
  let f = ip ? parseInt(ip).toLocaleString("en-US") : "";
  if (raw.includes(".")) f += "." + (dec || "");
  if (f !== el.value) el.value = f;
}
function commit(op){
  const v = parseAmount($("inAmt").value);
  if (v === null){ if ($("inAmt").value.trim()) setStat("Angka tidak valid.","err"); return; }
  // pastikan tanggal tersimpan sebagai "d/m" walau kolomnya belum ditinggalkan
  if (usedate) setDate($("inDate").dataset.raw);
  const ev = ["e", v, op, usedate ? $("inDate").value.trim() : ""];
  if (sel !== null){ curTape()[sel] = ev; clearSel(); setStat("Baris diperbarui.","ok"); }
  else { curTape().push(ev); setStat("Siap."); }
  // reset baris berikutnya: kosongkan Nominal & Tanggal; tanggal di-reset tiap baris
  $("inAmt").value = ""; setDate("");
  if (usedate) focusDate(); else focusAmt();
  refreshCalcHead(); updatePreview(); saveAll();
}

function keyTot(){
  clearSel();

  if (!count) return;
  curTape().push(["t"]);

/* CA = bersihkan semua baris pita ini, sisakan "0 C" saja */
function keyCA(silent){
  clearSel();
  const t = curTape();
  t.length = 0;
  t.push(["c"]);
  refreshCalcHead(); updatePreview(); saveAll();
  if (!silent) setStat("Semua baris dihapus.");
}
/* Baru = buat pita baru (pita lama tersimpan sebagai riwayat, maks 6) */
function keyNew(silent){
  clearSel();
  const newest = tapes[tapes.length-1];
  if (newest.some(ev => ev[0]==="e")){
    tapes.push([["c"]]);
    while (tapes.length > 6) tapes.shift();
  }
  active = tapes.length - 1;
  refreshCalcHead(); updatePreview(); saveAll();
  if (!silent) setStat("Pita baru.");
}
function delRow(){
  if (sel === null) return;
  curTape().splice(sel, 1);
  clearSel(); refreshCalcHead(); updatePreview(); saveAll();
  setStat("Baris dihapus.","ok");
}
/* hapus kejadian terakhir di pita (kecuali penanda awal "c") */
function deleteLastRow(){
  const t = curTape(), last = t.length - 1;
  if (last >= 0 && t[last][0] !== "c"){
    t.splice(last, 1);
    clearSel(); refreshCalcHead(); updatePreview(); saveAll();
    setStat("Baris terakhir dihapus.","ok");
    return true;
  }
  return false;
}
/* tombol ⌫ / Backspace: ada isi -> hapus 1 angka; kolom kosong -> hapus baris.
   saat sedang mengedit baris & kolom dikosongkan -> hapus baris itu. */
function backspace(){
  const el = $("inAmt");
  if (el.value){ el.value = el.value.slice(0,-1); liveComma(); }
  else if (sel !== null) delRow();
  else deleteLastRow();
}
/* ================= Bluetooth LE (ESC/POS) ================= */
/* Daftar layanan BLE printer thermal yang umum - halaman hanya boleh
   mengakses layanan yang disebut di sini. */
/* Semua UUID ditulis lengkap sebagai string - jembatan Bluetooth Bluefy
   tidak bisa membaca kode angka pendek (0x18F0 dst.). */
const BLE_SERVICES = [
  "000018f0-0000-1000-8000-00805f9b34fb",  // ESC/POS-over-BLE standar (char 2AF1)
  "0000ae30-0000-1000-8000-00805f9b34fb",  // printer saku (char AE01)
  "0000ff00-0000-1000-8000-00805f9b34fb",
  "0000ff10-0000-1000-8000-00805f9b34fb",
  "0000ff12-0000-1000-8000-00805f9b34fb",
  "0000ffd0-0000-1000-8000-00805f9b34fb",
  "0000ffe0-0000-1000-8000-00805f9b34fb",
  "0000ffe5-0000-1000-8000-00805f9b34fb",
  "0000fff0-0000-1000-8000-00805f9b34fb",
  "0000abf0-0000-1000-8000-00805f9b34fb",
  "0000fee7-0000-1000-8000-00805f9b34fb",
  "49535343-fe7d-4ae5-8fa9-9fafd205e455",  // ISSC/Microchip UART (Rongta dkk.)
  "e7810a71-73ae-499d-8c15-faa9aef0c3f2",  // Zjiang/Goojprt dkk.
];
let bleDevice = null, bleChar = null;

function blog(msg){
  const el = $("btlogtxt");
  el.textContent += msg + "\n";
}
function propsOf(c){
  const p = c.properties || {};
  const list = ["write","writeWithoutResponse","notify","read","indicate"]
    .filter(k => p[k]).join(",");
  return list || "?";
}
/* karakteristik "tulis" yang dikenal pada printer thermal (dicocokkan
   berdasarkan UUID kalau Bluefy tidak menyediakan .properties) */
const WRITE_CHARS = ["2af1","ffe1","ff02","ff03","ae01","abf1",
  "49535343-8841-43f4-a8d4-ecbe34729bb3",
  "bef8d6c9-9c21-4c9e-b632-bd58c1009f9f"];
function isKnownWrite(uuid){
  const u = uuid.toLowerCase();
  return WRITE_CHARS.some(w => u === w || u.startsWith("0000" + w + "-") || u.includes(w));
}
async function connectBT(){
  if (!navigator.bluetooth){
    setStat("Bluetooth tidak tersedia. Buka halaman ini di aplikasi Bluefy.","err");
    return false;
  }
  bleChar = null;
  try {
    if (!bleDevice){
      blog("--- " + new Date().toLocaleTimeString() + " ---");
      blog("Membuka daftar perangkat...");
      bleDevice = await navigator.bluetooth.requestDevice({
        acceptAllDevices: true, optionalServices: BLE_SERVICES });
      blog("Dipilih: " + (bleDevice.name || "(tanpa nama)"));
      bleDevice.addEventListener("gattserverdisconnected", () => {
        bleChar = null; $("btnBT").classList.remove("on");
        $("btnBT").innerHTML = "&#9679; Hubungkan";
        blog("Perangkat terputus.");
      });
    }
    let server = null, lastErr = null;
    if (bleDevice.gatt.connected){            // sudah tersambung -> pakai ulang
      server = bleDevice.gatt;
      blog("GATT sudah tersambung, dipakai ulang.");
    }
    for (let i = 1; i <= 3 && !server; i++){
      try {
        blog("Menghubungkan GATT (percobaan " + i + ")...");
        server = await bleDevice.gatt.connect();
      } catch(e){
        lastErr = e;
        blog("  gagal: " + e.name + " - " + e.message);
        // Bluefy kadang melempar "already registered/connected" padahal
        // sambungan sudah aktif -> pakai saja sambungan yang ada.
        if (/already|registered|connected/i.test((e.name || "") + " " + (e.message || ""))){
          blog("  (dianggap sudah tersambung)");
          server = bleDevice.gatt;
          break;
        }
        await sleep(900);
      }
    }
    if (!server) throw lastErr;
    blog("GATT terhubung. Mencari layanan...");
    let services = [];
    try { services = await server.getPrimaryServices(); }
    catch(e){ blog("getPrimaryServices: " + e.name + " - " + e.message); }
    blog("Layanan terlihat: " + services.length);
    let byProp = null, byName = null, anyChar = null;
    for (const s of services){
      blog("svc " + s.uuid);
      let chars = [];
      try { chars = await s.getCharacteristics(); }
      catch(e){ blog("  (karakteristik: " + e.message + ")"); continue; }
      for (const c of chars){
        blog("  chr " + c.uuid + " [" + propsOf(c) + "]");
        const p = c.properties || {};
        if ((p.writeWithoutResponse || p.write) && !byProp) byProp = c;
        if (isKnownWrite(c.uuid) && !byName) byName = c;
        if (!anyChar) anyChar = c;
      }
    }
    // pilih: yang jelas bisa tulis > yang UUID-nya dikenal > apa saja
    bleChar = byProp || byName || anyChar;
    if (!bleChar){
      blog("Tidak ditemukan jalur tulis.");
      setStat("Layanan printer tidak dikenali - buka LOG BLUETOOTH di bawah "
              + "dan kirimkan isinya.","err");
      $("btlog").open = true;
      return false;
    }
    blog("Dipakai: chr " + bleChar.uuid);
    $("btnBT").classList.add("on");
    $("btnBT").innerHTML = "&#9679; " + (bleDevice.name || "Terhubung");
    setStat("Printer terhubung.","ok");
    return true;
  } catch(e){
    if (e && e.name === "NotFoundError"){ setStat("Dibatalkan."); return false; }
    blog("ERROR: " + (e ? e.name + " - " + e.message : "tidak diketahui"));
    setStat("Gagal terhubung (" + (e ? e.name : "?") + ") - buka LOG BLUETOOTH "
            + "di bawah dan kirimkan isinya.","err");
    $("btlog").open = true;
    bleDevice = null;  // mulai bersih pada percobaan berikutnya
    return false;
  }
}
function escposPayload(text){
  const head = [0x1b,0x40, 0x1d,0x4c, LEFT_MARGIN_DOTS & 0xff, LEFT_MARGIN_DOTS >> 8];
  const body = [];
  for (const ch of text.replace(/[^\x00-\x7f]/g,"?")) body.push(ch.charCodeAt(0));
  for (let i = 0; i < FEED_LINES; i++) body.push(0x0a);
  return new Uint8Array([...head, ...body]);
}
const sleep = ms => new Promise(r => setTimeout(r, ms));
async function writeOne(part){
  // .properties tak bisa dipercaya di Bluefy: coba tanpa-respons dulu,
  // lalu dengan-respons; ingat mana yang berhasil.
  if (bleWrite._m === "wor" || bleWrite._m == null){
    try { await bleChar.writeValueWithoutResponse(part); bleWrite._m = "wor"; return; }
    catch(e){ if (bleWrite._m === "wor") throw e; }
  }
  await bleChar.writeValue(part); bleWrite._m = "wr";
}
async function bleWrite(bytes){
  let chunk = 100;
  for (let attempt = 0; attempt < 2; attempt++){
    try {
      for (let i = 0; i < bytes.length; i += chunk){
        await writeOne(bytes.slice(i, i + chunk));
        await sleep(25);
      }
      blog("Cetak terkirim (" + bytes.length + " byte).");
      return;
    } catch(e){
      blog("tulis gagal (potongan " + chunk + "): " + e.name + " - " + e.message);
      if (attempt === 0){ chunk = 20; bleWrite._m = null; await sleep(300); }
      else throw e;
    }
  }
}
/* ================= tombol utama ================= */
async function doPrint(skipConfirm){
  const hasContent = mode === "calc"
    ? curTape().some(ev => ev[0]==="e") : $("txt").value.trim() !== "";
  if (!hasContent){ setStat("Tidak ada yang dicetak.","err"); return; }
  let summary;
  if (mode === "calc"){
    const [res, sum] = resolveTape(curTape());
    summary = `${res.filter(o=>o[0]==="e").length} baris, total ${fmtAmount(sum)}`;
  } else {
    summary = `${$("txt").value.split("\n").filter(l=>l.trim()).length} baris`;
  }
  if (!skipConfirm && !confirm(`Cetak ke printer?\n${summary}`)) { setStat("Dibatalkan."); return; }
  // bleChar dikosongkan oleh listener "gattserverdisconnected" saat benar-benar
  // terputus; jangan andalkan gatt.connected (tidak akurat di Bluefy).
  if (!bleChar){
    if (!await connectBT()) return;
  }
  const btn = $("btnPrint");
  btn.disabled = true; setStat("Mengirim...");
  try {
    await bleWrite(escposPayload(currentDraft()));
    setStat("Terkirim ✓","ok");
    saveAll();
  } catch(e){
    setStat("Gagal mencetak: " + e.message, "err");
  } finally { btn.disabled = false; }
}
function doClear(){
  const hasContent = mode === "calc"
    ? curTape().some(ev => ev[0]!=="c") : $("txt").value.trim() !== "";
  if (hasContent && !confirm("Hapus isi tampilan ini?")) return;
  if (mode === "calc"){ curTape().length = 0; curTape().push(["c"]); clearSel(); }
  else $("txt").value = "";
  refreshCalcHead(); updatePreview(); saveAll(); setStat("Siap.");
}
/* ================= event wiring ================= */
document.querySelectorAll("#segMode .btn").forEach(b =>
  b.onclick = () => { mode = b.dataset.m; saveAll(); applyMode(); });
$("togNum").onclick = () => { numbered = !numbered; saveAll(); refreshToggles(); updatePreview(); };
$("togHead").onclick = () => { headers = !headers; saveAll(); refreshToggles(); updatePreview(); };
$("togAuto").onclick = () => { autoprint = !autoprint; localStorage.cdp_auto = autoprint ? "1" : "0"; refreshToggles();
  setStat(autoprint ? "Auto-cetak aktif: TOTAL langsung mencetak." : "Auto-cetak mati."); };
$("txt").addEventListener("input", () => { updatePreview(); saveAll(); });
$("btnBT").onclick = connectBT;
$("btnPrint").onclick = () => doPrint(false);
$("btnClear").onclick = doClear;
$("btnPrev").onclick = () => { if (active > 0){ active--; clearSel(); refreshCalcHead(); updatePreview(); } };
$("btnNext").onclick = () => { if (active < tapes.length-1){ active++; clearSel(); refreshCalcHead(); updatePreview(); } };
$("btnHist").onclick = () => {
  if (!confirm("Hapus SEMUA riwayat pita?")) return;
  tapes = [[["c"]]]; active = 0; clearSel();
  refreshCalcHead(); updatePreview(); saveAll(); setStat("Riwayat dihapus.","ok");
};
$("btnNew").onclick = () => keyNew();
$("btnZeroC").onclick = () => {
  zeroc = !zeroc; saveAll(); refreshToggles(); updatePreview();
  setStat(zeroc ? "Baris 0 C ditampilkan." : "Baris 0 C disembunyikan.");
};
$("btnDelRow").onclick = delRow;
$("btnCancelEdit").onclick = () => { clearSel(); updatePreview(); setStat("Edit dibatalkan."); };
$("inAmt").addEventListener("input", liveComma);
$("preview").addEventListener("click", e => {
  const span = e.target.closest(".row");
  if (span && mode === "calc") selectRow(parseInt(span.dataset.i));
});
// jangan curi fokus dari kolom isian saat menekan tombol numpad
$("pad").addEventListener("mousedown", e => e.preventDefault());
$("pad").addEventListener("click", e => {
  const b = e.target.closest("[data-k]");
  if (!b) return;
  if (navigator.vibrate) navigator.vibrate(8);  // getar halus tiap tekan
  const k = b.dataset.k, el = $("inAmt");
  const onDate = usedate && activeField === "date";
  if (k === "C") { if (onDate) setDate(""); else el.value = ""; }
  else if (k === "BS") { if (onDate) padDateBack(); else backspace(); }
  else if (k === "SUB") keySub();
  else if (k === "TOT") keyTot();
  else if (k === "CA") keyCA();
  else if (k === "+") commit("+");
  else if (k === "-") commit("-");
  else if (k === ".") { if (!onDate && !el.value.includes(".")) el.value += "."; }
  else if (onDate) { for (const d of k) padDateDigit(d); }   // "00"/"000" -> per angka
  else { el.value += k; liveComma(); }
});
/* ---- keyboard fisik (laptop): ketik angka -> kolom Nominal, Enter = + ---- */
document.addEventListener("keydown", e => {
  if (mode !== "calc") return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  const el = $("inAmt"), ae = document.activeElement;
  // biarkan kolom Tgl (atau input lain) menangani ketikannya sendiri
  if (ae && ae !== el && (ae.tagName === "INPUT" || ae.tagName === "TEXTAREA")) return;
  const k = e.key;
  // Shift+Enter: lompat dari Nominal kembali ke Tanggal
  if (k === "Enter" && e.shiftKey){ if (usedate) focusDate(); e.preventDefault(); return; }
  // panah kiri di ujung kiri Nominal -> pindah ke Tanggal ("di ujung")
  if (k === "ArrowLeft"){
    if (usedate && el.selectionStart === 0 && el.selectionEnd === 0){ focusDate(); e.preventDefault(); }
    return;   // selain di ujung: biarkan caret bergerak normal
  }
  if (k === "ArrowRight" || k === "ArrowUp" || k === "ArrowDown") return;  // caret normal
  if (/^[0-9]$/.test(k)){ el.value += k; liveComma(); el.focus(); e.preventDefault(); }
  else if (k === "."){ if (!el.value.includes(".")) el.value += "."; el.focus(); e.preventDefault(); }
  else if (k === "Enter" || k === "+"){ commit("+"); e.preventDefault(); }  // commit atur fokus
  else if (k === "-"){ commit("-"); e.preventDefault(); }
  else if (k === "Backspace" || k === "Delete"){ backspace(); el.focus(); e.preventDefault(); }
  else if (k === "Escape"){
    if (sel !== null){ clearSel(); updatePreview(); setStat("Edit dibatalkan."); }
    else { el.value = ""; setDate(""); }
    e.preventDefault();
  }
});
/* ---- kolom Tanggal: saat difokus tampil angka mentah (DDMM), saat ditinggalkan
   tampil "d/m"; Enter / panah-kanan-di-ujung lompat ke Nominal ---- */
$("inAmt").addEventListener("focus", () => { activeField = "amt"; });
$("inDate").addEventListener("focus", () => { activeField = "date"; const el=$("inDate"); el.value = el.dataset.raw || ""; moveCaretEnd(el); });
$("inDate").addEventListener("blur", () => setDate($("inDate").dataset.raw));
$("inDate").addEventListener("input", () => {
  const el=$("inDate"); el.dataset.raw = el.value.replace(/\D/g,"").slice(0,4); el.value = el.dataset.raw;
});
$("inDate").addEventListener("keydown", e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  const el = $("inDate"), k = e.key;
  if (k === "Enter" && !e.shiftKey){                        // Tanggal -> Nominal
    setDate(el.dataset.raw); $("inAmt").focus(); e.preventDefault();
  } else if (k === "ArrowRight"){                            // di ujung kanan -> Nominal
    if (el.selectionStart >= el.value.length){
      setDate(el.dataset.raw); $("inAmt").focus(); moveCaretStart($("inAmt")); e.preventDefault();
    }
  }
  // ArrowLeft di ujung kiri: kolom paling kiri, biarkan caret bergerak normal
});
$("togDate").onclick = () => {
  usedate = !usedate; saveAll(); applyUsedate();
  if (mode === "calc"){
    if (usedate){ setDate(""); focusDate(); } else $("inAmt").focus();
    setStat(usedate ? "Kolom tanggal aktif (d/m). Enter: ke Nominal, Shift+Enter: kembali."
                    : "Kolom tanggal mati.");
  }
};
/* init */
initGrip(); applyUsedate(); refreshToggles(); applyMode();
</script>
